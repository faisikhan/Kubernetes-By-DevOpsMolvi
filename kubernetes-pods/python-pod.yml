apiVersion: v1
kind: Pod
metadata:
  name: python-pod
  labels:
    app: python-app
spec:
  containers:
  - name: python-container
    image: python:3.11-slim
    command: ["/bin/sh", "-c"]
    args:
    - |
      echo "Starting Python script..."
      python -c "
      import time
      while True:
          print('Python application is running smoothly...', flush=True)
          time.sleep(5)
      "
